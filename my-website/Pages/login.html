<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Örneği</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body style="height:100vh; display:flex; justify-content:center; align-items:center; background:#A9B388;">
    <div class="card shadow p-4" style="width: 350px; background:#5F6F52;">
    <div class="login-box">
     <h2 class="text-center mb-4">Giriş Yap</h2>
    </div>
    <form id="loginForm">
      <div class="mb-3">
        <label for="email" class="form-label">E-posta</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Şifre</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Giriş</button>
      <link rel="stylesheet" href="/my-website/style.css">
       <!-- script.js dosyasını çağırıyoruz -->
   <script type="module" src="/my-website/script/login.js"></script> 
    </form>
  </div>
  </div>

</body>
</html>
